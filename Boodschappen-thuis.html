<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Weekmenu & Boodschappen (V7)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        h1, h2 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 25px; font-size: 0.9rem; }

        /* PLANNER */
        .day-row { display: flex; align-items: center; background: #fff; border-bottom: 1px solid #eee; padding: 12px 5px; gap: 10px; }
        .day-label { font-weight: 700; width: 90px; color: #2c3e50; font-size: 0.9rem; }
        .day-select { flex-grow: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; }
        .person-input-group { display: flex; align-items: center; gap: 5px; background: #f9f9f9; padding: 5px 10px; border-radius: 6px; border: 1px solid #eee;}
        .person-input { width: 40px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-weight: bold; }

        /* BASICS */
        .basics-section { background: #fafafa; padding: 15px; border-radius: 8px; margin-top: 20px; border: 1px solid #eee; }
        .basics-input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .basics-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .basic-item { display: flex; align-items: center; background: white; padding: 8px; border-radius: 6px; border: 1px solid #e0e0e0; font-size: 0.9rem; }
        .basic-qty { width: 35px; padding: 3px; margin: 0 8px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        .basic-del { margin-left: auto; color: #e74c3c; cursor: pointer; font-weight: bold; padding: 0 5px; font-size: 1.2rem; }
        .basic-del:hover { color: #c0392b; }

        /* KNOPPEN */
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        button { border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; flex: 1; transition: 0.2s; color: white; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .btn-calc { background-color: #27ae60; } .btn-calc:hover { background-color: #219150; }
        .btn-book { background-color: #e67e22; } .btn-book:hover { background-color: #d35400; }
        .btn-clear { background-color: #95a5a6; max-width: 50px; }
        .btn-toggle { background-color: #34495e; font-size: 0.9rem; padding: 10px; margin-bottom: 15px; width: 100%; color: white;}
        
        .action-btn { width: 100%; margin-top: 10px; padding: 12px; }
        .btn-whatsapp { background-color: #25D366; }

        /* LIJST STIJL */
        .view-section { display: none; margin-top: 30px; border-top: 2px dashed #eee; padding-top: 20px; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

        .category-header { background-color: #34495e; color: white; padding: 8px 12px; border-radius: 6px; margin-top: 15px; font-weight: bold; font-size: 0.9rem; }
        
        .shopping-item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; transition: 0.2s; }
        .shopping-item input { margin-right: 12px; transform: scale(1.3); cursor: pointer; accent-color: #aaa; }
        .shopping-item label { flex-grow: 1; cursor: pointer; display: flex; align-items: center; }
        
        /* STYLING VOOR "AL IN HUIS" */
        .shopping-item.checked { color: #aaa; text-decoration: line-through; background-color: #fcfcfc; }
        .shopping-item.hidden { display: none; }

        .store-tag { font-size: 0.7em; padding: 2px 6px; border-radius: 4px; margin-left: auto; font-weight: bold; text-transform: uppercase; text-decoration: none !important; display: inline-block; }
        .tag-lidl { background-color: #fff3e0; color: #ef6c00; }
        .tag-eko { background-color: #e8f5e9; color: #2e7d32; }

        /* PRINT */
        @media print {
            .no-print, .btn-group, .basics-section, #planner-area, .info-box { display: none !important; }
            .view-section { display: block !important; border: none; }
            .shopping-item.checked { display: none; } /* Print nooit wat je al hebt */
            .recipe-page { page-break-inside: avoid; border: 1px solid #ccc; margin-bottom: 20px; padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="no-print">Weekmenu &amp; Boodschappen</h1>
    <p class="subtitle no-print">Plan, check je voorraad & shop</p>

    <div id="planner-area" class="no-print">
        </div>

    <div class="basics-section no-print">
        <h3 style="margin-top:0;">Mijn Standaard Boodschappen</h3>
        <p style="font-size:0.85rem; color:#666; margin-bottom:10px;">Dingen die je vaak nodig hebt (Koffie, Wc-papier, etc.). Ze worden onthouden!</p>
        <div class="basics-input-row">
            <input type="text" id="new-basic-name" placeholder="Typ hier (en druk op Enter)..." style="flex-grow:1; padding:8px; border:1px solid #ddd; border-radius:4px;">
            <button onclick="addBasicItem()" style="flex:0; padding:8px 20px; background:#3498db;">+</button>
        </div>
        <div id="basics-list" class="basics-list"></div>
    </div>

    <div class="btn-group no-print">
        <button class="btn-calc" onclick="showShoppingList()">Maak Lijst</button>
        <button class="btn-book" onclick="showBooklet()">Receptenboekje</button>
        <button class="btn-clear" onclick="clearWeek()" title="Wis planning">Wis</button>
    </div>

    <div id="view-shopping" class="view-section">
        <h2>Boodschappenlijst</h2>
        
        <button class="btn-toggle no-print" onclick="toggleCheckedItems()" data-state="shown">Verberg wat ik al heb</button>

        <div id="shopping-list-content"></div>
        
        <button class="action-btn btn-whatsapp no-print" onclick="copyToClipboard()">Kopieer (Alleen wat ik nog moet kopen)</button>
        <button class="action-btn no-print" onclick="window.print()" style="background:#3498db;">Print Lijst</button>
    </div>

    <div id="view-booklet" class="view-section">
        <h2 class="no-print">Weekboekje</h2>
        <div id="booklet-content"></div>
        <button class="action-btn no-print" onclick="window.print()" style="background:#3498db;">Print Boekje</button>

</div>

            steps: ["Week cashews 30 min. Fruit ui/knoflook.", "Bak bleekselderij en kruiden.", "Voeg bloemkool, spruitjes, spinazie toe.", "Kook met bouillon en cashews 25 min.", "Voeg kokosmelk/limoen toe en pureer."]
        },
        "Zoete Aardappel Pindasoep": {
            ing: { "AGF": ["1 Ui", "3 tenen Knoflook", "2cm Verse gember", "750g Zoete aardappels", "Verse Koriander"], "Houdbaar": ["1L Groentebouillon", "4 el Pindakaas", "1 tl Limoensap", "Olijfolie", "Kerriepoeder", "Kurkuma", "Komijn"], "Zuivel/Koeling": ["Plantaardige kookroom"] },
            steps: ["Fruit ui, knoflook, gember.", "Bak kruiden mee. Voeg aardappel + bouillon toe.", "Kook 15 min zacht.", "Voeg pindakaas + limoen toe. Pureer."]

        "Cheesy Broccolisoep": {
            ing: { "AGF": ["1 Ui", "3 tenen Knoflook", "2 stengels Bleekselderij", "2 Wortels", "1 Zoete aardappel", "1 Bloemkool", "1 Broccoli", "Verse Dille", "Citroensap"], "Houdbaar": ["750ml Groentebouillon", "400ml Kokosmelk", "Handje Cashewnoten", "1 tl Mosterd", "Edelgistvlokken (opt)"] },
            steps: ["Fruit ui/knoflook. Bak groenten (behalve broccoli).", "Voeg mosterd/kruiden toe. Kook met bouillon/kokosmelk 25 min.", "Kook broccoli apart.", "Pureer soep met cashews. Voeg broccoli toe."]

            steps: ["Fruit ui/knoflook. Bak gehakt.", "Bak groenten en kruiden 5 min.", "Voeg tomaten en bouillon toe. Kook.", "Voeg gebroken lasagnebladen toe (15 min)."]
        },

            ing: { "AGF": ["1 Ui", "3 tenen Knoflook", "2 Winterpenen", "3 stengels Bleekselderij", "2 Citroenen (sap)", "Verse Dille"], "Houdbaar": ["225g Orzo", "250g Cannellini bonen", "900ml Groentebouillon", "350ml Kokosmelk", "Tijm", "Kurkuma"] },
            steps: ["Fruit ui/knoflook. Bak wortel/bleekselderij.", "Voeg kruiden, orzo, bonen, bouillon, kokosmelk toe.", "Kook 10 min tot orzo gaar is.", "Roer citroensap en dille erdoor."]
        },
        "Vegan Caesarsalade": {
            ing: { "AGF": ["500g Spruitjes", "250g Ijsbergsla", "1 Rode ui", "Verse Peterselie", "2 Avocado's", "Citroensap"], "Vers/Koeling": ["300g Vegan kipstukjes"], "Houdbaar": ["100g Oud brood (croutons)", "3 el Gedroogde cranberry's", "1 el Hennepzaad", "50g Hummus", "1 tl Dijonmosterd", "Knoflookpoeder", "Cashewnoten"] },
            steps: ["Oven 165gr. Bak broodblokjes (croutons) 10 min.", "Bak kipstukjes goudbruin.", "Meng gesneden groenten in kom.", "Maak dressing van hummus/mosterd/citroen.", "Meng alles."]
        },
        "Pina Colada Smoothie": {
            ing: { "AGF": ["2 Bananen"], "Diepvries": ["300g Bevroren ananas"], "Houdbaar": ["400ml Kokosmelk", "2 el Agavesiroop", "2 tl Hennepzaad", "Kurkumapoeder"] },
            steps: ["Doe alles in de blender.", "Mix tot glad en romig.", "Voeg kurkuma toe voor gele kleur."]
        }
    };
    const daysOfWeek = ["Maandag", "Dinsdag", "Woensdag", "Donderdag", "Vrijdag", "Zaterdag", "Zondag"];
    // DIT IS DE BELANGRIJKE VARIABELE
    let myBasics = [];

    // --- 2. INITIALISATIE ---
    window.onload = function() { 
        buildPlanner(); 
        loadData(); 
        renderBasicsList(); 
        
        // Enter toets ondersteuning voor basics
        document.getElementById("new-basic-name").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                addBasicItem();
            }
        });
    };

    function buildPlanner() {
        const container = document.getElementById('planner-area');
        let optionsHtml = `<option value="">-- Kies gerecht --</option>`;
        for (let r in recipesDB) { optionsHtml += `<option value="${r}">${r}</option>`; }
        daysOfWeek.forEach((day, i) => {
            container.innerHTML += `
            <div class="day-row">
                <div class="day-label">${day}</div>
                <select id="recipe-${i}" class="day-select" onchange="saveData()">${optionsHtml}</select>
                <div class="person-input-group"><span style="font-size:0.8em">Pers:</span><input type="number" id="pers-${i}" class="person-input" value="4" min="1" onchange="saveData()"></div>
            </div>`;
        });
    }

    // --- 3. OPSLAAN & LADEN (CRUCIAAL) ---
    function saveData() {
        let plan = {};
        daysOfWeek.forEach((_, i) => {
            plan[`r-${i}`] = document.getElementById(`recipe-${i}`).value;
            plan[`p-${i}`] = document.getElementById(`pers-${i}`).value;
        });
        localStorage.setItem('App_WeekPlan', JSON.stringify(plan));
        localStorage.setItem('App_Basics', JSON.stringify(myBasics)); // Opslaan van de array
    }

    function loadData() {
        let plan = JSON.parse(localStorage.getItem('App_WeekPlan'));
        if (plan) daysOfWeek.forEach((_, i) => {
            if(plan[`r-${i}`]) document.getElementById(`recipe-${i}`).value = plan[`r-${i}`];
            if(plan[`p-${i}`]) document.getElementById(`pers-${i}`).value = plan[`p-${i}`];
        });

        // HIER LADEN WE DE STANDAARD BOODSCHAPPEN
        let savedBasics = JSON.parse(localStorage.getItem('App_Basics'));
        if (savedBasics && Array.isArray(savedBasics)) {
            myBasics = savedBasics;
        }
    }

    function clearWeek() {
        if(confirm("Planning wissen? (Je standaard items blijven bewaard)")) {
            daysOfWeek.forEach((_, i) => { document.getElementById(`recipe-${i}`).value = ""; document.getElementById(`pers-${i}`).value = "4"; });
            saveData();
        }
    }

    // --- 4. BASICS LOGICA ---
    function addBasicItem() {
        let input = document.getElementById('new-basic-name');
        let name = input.value.trim();
        if(name) { 
            myBasics.push({ name: name, qty: 1, checked: true }); // Standaard aangevinkt = Nodig
            input.value = ""; 
            saveData(); 
            renderBasicsList(); 
        }
    }
    function toggleBasic(i) { myBasics[i].checked = !myBasics[i].checked; saveData(); }
    function updateBasicQty(i, v) { myBasics[i].qty = v; saveData(); }
    function deleteBasic(i) { myBasics.splice(i, 1); saveData(); renderBasicsList(); }
    
    function renderBasicsList() {
        const list = document.getElementById('basics-list');
        list.innerHTML = '';
        myBasics.forEach((item, i) => {
            const row = document.createElement('div');
            row.className = 'basic-item';
            row.title = 'Vink aan als je dit deze week nodig hebt';

            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.checked = !!item.checked;
            checkbox.addEventListener('change', () => toggleBasic(i));

            const qty = document.createElement('input');
            qty.type = 'number';
            qty.className = 'basic-qty';
            qty.value = item.qty;
            qty.min = '1';
            qty.addEventListener('change', () => updateBasicQty(i, qty.value));

            const name = document.createElement('span');
            name.style.flexGrow = '1';
            name.style.marginLeft = '5px';
            name.textContent = item.name;

            const del = document.createElement('span');
            del.className = 'basic-del';
            del.textContent = 'x';
            del.addEventListener('click', () => deleteBasic(i));

            row.append(checkbox, qty, name, del);
            list.appendChild(row);
        });
    }

    // --- 5. LOGICA ---
    function isMeasurementUnit(word) {
        const units = new Set(["g", "kg", "mg", "ml", "l", "cl", "dl", "el", "tl"]);
        return units.has(word);
    }

    function scaleIngredientString(ingString, persons) {
        if (persons == 4) return ingString;
        return ingString.replace(/(\d+([.,]\d+)?)/g, (match, _num, _dec, offset, full) => {
            let num = parseFloat(match.replace(',', '.'));
            let newNum = (num / 4) * persons;
            const rest = full.slice(offset + match.length);
            const unitMatch = rest.match(/^\s*([A-Za-z]+)/);
            const unit = unitMatch ? unitMatch[1].toLowerCase() : '';
            if (unit && isMeasurementUnit(unit)) {
                if (newNum % 1 === 0) return newNum;
                return newNum.toFixed(1).replace('.', ',');
            }
            return String(Math.ceil(newNum));
        });
    }

    function parseCountItem(text) {
        const match = text.match(/^(\d+(?:[.,]\d+)?)\s*(?:x\s+|\s+)(.+)$/i);
        if (!match) return null;
        let count = parseFloat(match[1].replace(',', '.'));
        if (!isFinite(count) || count <= 0) return null;
        return { count, name: match[2].trim() };
    }

    function formatCount(count) {
        if (count % 1 === 0) return String(count);
        return count.toFixed(1).replace('.', ',');
    }

    function mergeShoppingList(items) {
        const merged = [];
        const map = new Map();

        items.forEach(item => {
            const parsed = parseCountItem(item.product);
            if (parsed) {
                const key = `${item.category}|${parsed.name.toLowerCase()}`;
                if (map.has(key)) {
                    map.get(key).count += parsed.count;
                } else {
                    map.set(key, { category: item.category, name: parsed.name, count: parsed.count, hasCount: true });
                }
                return;
            }

            const key = `${item.category}|${item.product.toLowerCase()}`;
            if (!map.has(key)) {
                map.set(key, { category: item.category, product: item.product, hasCount: false });
            }
        });

        map.forEach(value => {
            if (value.hasCount) {
                merged.push({ category: value.category, product: `${formatCount(value.count)}x ${value.name}` });
            } else {
                merged.push({ category: value.category, product: value.product });
            }
        });

        return merged;
    }

    function showShoppingList() {
        document.getElementById('view-shopping').classList.add('active');
        document.getElementById('view-booklet').classList.remove('active');
        saveData();

        let finalList = [];
        
        // Recepten
        daysOfWeek.forEach((_, i) => {
            let rName = document.getElementById(`recipe-${i}`).value;
            let pCount = parseFloat(document.getElementById(`pers-${i}`).value) || 4;
            if (rName && recipesDB[rName]) {
                let ing = recipesDB[rName].ing;
                for (let cat in ing) {
                    ing[cat].forEach(raw => finalList.push({ category: cat, product: scaleIngredientString(raw, pCount) }));
                }
            }
        });

        // Basics (Alleen de aangevinkte!)
        myBasics.forEach(b => {
            if(b.checked) finalList.push({ category: classifyItem(b.name), product: b.qty > 1 ? `${b.qty}x ${b.name}` : b.name });
        });

        finalList = mergeShoppingList(finalList);

        // Sorteren
        const route = ["AGF", "Vers/Koeling", "Zuivel/Koeling", "Houdbaar", "Diepvries", "Huishouden", "Overig"];
        let sorted = {}; route.forEach(c => sorted[c] = []);
        finalList.forEach(item => {
            let c = route.includes(item.category) ? item.category : "Overig";
            sorted[c].push(item);
        });

        // Renderen
        const output = document.getElementById('shopping-list-content');
        output.innerHTML = '';

        let checkboxIndex = 0;
        route.forEach(cat => {
            if(sorted[cat].length > 0) {
                let catName = mapCategoryName(cat);
                let catDiv = document.createElement('div');

                const header = document.createElement('div');
                header.className = 'category-header';
                header.textContent = catName;
                catDiv.appendChild(header);
                
                sorted[cat].forEach(item => {
                    let tag = getStoreTag(item.product);
                    let row = document.createElement('div');
                    row.className = "shopping-item";

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = `shop-item-${checkboxIndex++}`;
                    checkbox.addEventListener('change', () => toggleLine(checkbox));

                    const label = document.createElement('label');
                    label.setAttribute('for', checkbox.id);

                    const name = document.createElement('span');
                    name.textContent = item.product;
                    label.appendChild(name);

                    if (tag) {
                        const tagSpan = document.createElement('span');
                        tagSpan.className = `store-tag ${tag.className}`;
                        tagSpan.textContent = tag.text;
                        label.appendChild(tagSpan);
                    }

                    row.appendChild(checkbox);
                    row.appendChild(label);
                    catDiv.appendChild(row);
                });
                output.appendChild(catDiv);
            }
        });
        document.getElementById('view-shopping').scrollIntoView({behavior:'smooth'});
    }

    function toggleLine(checkbox) {
        let row = checkbox.closest('.shopping-item');
        if(checkbox.checked) row.classList.add('checked');
        else row.classList.remove('checked');
    }

    function toggleCheckedItems() {
        let items = document.querySelectorAll('.shopping-item.checked');
        let btn = document.querySelector('.btn-toggle');
        let shouldHide = btn.dataset.state !== 'hidden';
        
        items.forEach(item => item.classList.toggle('hidden', shouldHide));
        
        btn.dataset.state = shouldHide ? 'hidden' : 'shown';
        btn.innerText = shouldHide ? "Toon wat ik al heb" : "Verberg wat ik al heb";
    }

    function copyTextToClipboard(text) {
        if (navigator.clipboard && window.isSecureContext) {
            return navigator.clipboard.writeText(text);
        }
        return new Promise((resolve, reject) => {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'fixed';
            textarea.style.top = '-1000px';
            document.body.appendChild(textarea);
            textarea.select();
            try {
                const ok = document.execCommand('copy');
                document.body.removeChild(textarea);
                ok ? resolve() : reject(new Error('copy failed'));
            } catch (err) {
                document.body.removeChild(textarea);
                reject(err);
            }
        });
    }

    function copyToClipboard() {
        let text = "*Boodschappenlijst*\n\n";
        let headers = document.querySelectorAll('.category-header');
        
        headers.forEach(header => {
            let parentDiv = header.parentElement;
            let items = parentDiv.querySelectorAll('.shopping-item');
            let hasItemsToBuy = false;
            let catText = `*${header.innerText}*\n`;

            items.forEach(item => {
                let checkbox = item.querySelector('input');
                if(!checkbox.checked) {
                    hasItemsToBuy = true;
                    let txt = item.querySelector('span').innerText;
                    let tag = item.querySelector('.store-tag');
                    catText += `- ${txt} ${tag ? '('+tag.innerText+')' : ''}\n`;
                }
            });

            if(hasItemsToBuy) text += catText + "\n";
        });

        if(text === "*Boodschappenlijst*\n\n") {
            alert("Alles is afgevinkt! Je hoeft niets te kopen.");
        } else {
            copyTextToClipboard(text)
                .then(() => alert("Lijst gekopieerd!"))
                .catch(() => alert("Kopieren mislukt. Probeer handmatig te kopieren."));
        }
    }

    function showBooklet() {
        document.getElementById('view-booklet').classList.add('active');
        document.getElementById('view-shopping').classList.remove('active');
        const content = document.getElementById('booklet-content');
        content.innerHTML = '';
        daysOfWeek.forEach((day, i) => {
            let rName = document.getElementById(`recipe-${i}`).value;
            let pCount = document.getElementById(`pers-${i}`).value;
            if(rName) {
                let r = recipesDB[rName];
                content.innerHTML += `
                    <div class="recipe-page">
                        <div style="font-weight:bold; color:#e67e22;">${day} (${pCount} pers.)</div>
                        <div class="recipe-title">${rName}</div>
                        <strong>Ingrediënten:</strong><ul>${Object.values(r.ing).flat().map(ing => `<li>${scaleIngredientString(ing, pCount)}</li>`).join('')}</ul>
                        <strong>Bereiding:</strong><ol>${r.steps.map(s => `<li>${s}</li>`).join('')}</ol>
                    </div>`;
            }
        });
        document.getElementById('view-booklet').scrollIntoView({behavior:'smooth'});
    }

    function classifyItem(i) {
        i = i.toLowerCase();
        if(i.match(/papier|wasmiddel|tandpasta|zakken|schoonmaak/)) return "Huishouden";
        if(i.match(/melk|kaas|yoghurt|boter|ei|kwark/)) return "Zuivel/Koeling";
        if(i.match(/vlees|vis|kip|vega|gehakt/)) return "Vers/Koeling";
        if(i.match(/brood|rijst|pasta|saus|koffie|thee|olie|koek|chips/)) return "Houdbaar";
        if(i.match(/appel|banaan|ui|knoflook|tomaat|paprika|groente|fruit|sla|komkommer/)) return "AGF";
        return "Overig";
    }

    function getStoreTag(p) {
        p = p.toLowerCase();
        if(p.includes("edelgist")||p.includes("tahin")) return {className: 'tag-eko', text: 'EKO'};
        if(p.includes("wc")||p.includes("papier")||p.includes("courgette")) return {className: 'tag-lidl', text: 'LIDL'};
        return null;
    }
    function mapCategoryName(c) {
        const map = {"AGF":"Groente & Fruit", "Vers/Koeling":"Vers & Vega", "Houdbaar":"Voorraadkast", "Zuivel/Koeling":"Zuivel", "Huishouden":"Huishouden"};
        return map[c] || c;
    }
</script>
